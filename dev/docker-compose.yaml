services:
  auth-db:
    image: postgres:16-alpine
    container_name: colloquia-auth-db
    restart: unless-stopped
    env_file:
      - .dev.env
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colloquia -d colloquia-auth"]
      interval: 5s
      timeout: 5s
      retries: 5
      
volumes:
  auth-db-data: