services:
  ## ── Auth Domain -------------------------------------------------------------------
  ## Auth DB
  auth-db:
    image: postgres:16-alpine
    container_name: colloquia-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: colloquia
      POSTGRES_PASSWORD: colloquia_dev_password
      POSTGRES_DB: colloquia-auth
    ports:
      - "5434:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colloquia -d colloquia-auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  ## Auth DB Migrations
  auth-migrate:
    image: migrate/migrate:v4.18.1
    container_name: colloquia-auth-migrate
    volumes:
      - ../services/auth/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://colloquia:colloquia_dev_password@auth-db:5432/colloquia-auth?sslmode=disable"
      - "up"
    depends_on:
      auth-db:
        condition: service_healthy
    restart: on-failure

  ## Auth Service
  auth-service:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    container_name: colloquia-auth-service
    restart: unless-stopped
    env_file:
      - .dev.env
      - .secrets.env
    ports:
      - "50051:50051"
      - "8081:8081"
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
      users-service:
        condition: service_started

  ## ── Auth Domain -------------------------------------------------------------------

  ## ── Users Domain ------------------------------------------------------------------
  ## Users DB
  users-db:
    image: postgres:16-alpine
    container_name: colloquia-users-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: colloquia
      POSTGRES_PASSWORD: colloquia_dev_password
      POSTGRES_DB: colloquia-users
    ports:
      - "5435:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colloquia -d colloquia-users"]
      interval: 5s
      timeout: 5s
      retries: 5

  ## Users DB Migrations
  users-migrate:
    image: migrate/migrate:v4.18.1
    container_name: colloquia-users-migrate
    volumes:
      - ../services/users/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://colloquia:colloquia_dev_password@users-db:5432/colloquia-users?sslmode=disable"
      - "up"
    depends_on:
      users-db:
        condition: service_healthy
    restart: on-failure

  ## Users Service
  users-service:
    build:
      context: ../services/users
      dockerfile: Dockerfile
    container_name: colloquia-users-service
    restart: unless-stopped
    env_file:
      - .dev.env
      - .secrets.env
    ports:
      - "50052:50052"
      - "8082:8082"
    depends_on:
      users-migrate:
        condition: service_completed_successfully

  ## ── Users Domain ------------------------------------------------------------------

  ## ── Channels Domain ---------------------------------------------------------------
  ## Channels DB
  channels-db:
    image: postgres:16-alpine
    container_name: colloquia-channels-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: colloquia
      POSTGRES_PASSWORD: colloquia_dev_password
      POSTGRES_DB: colloquia-channels
    ports:
      - "5436:5432"
    volumes:
      - channels-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colloquia -d colloquia-channels"]
      interval: 5s
      timeout: 5s
      retries: 5

  ## Channels DB Migrations
  channels-migrate:
    image: migrate/migrate:v4.18.1
    container_name: colloquia-channels-migrate
    volumes:
      - ../services/channels/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://colloquia:colloquia_dev_password@channels-db:5432/colloquia-channels?sslmode=disable"
      - "up"
    depends_on:
      channels-db:
        condition: service_healthy
    restart: on-failure

  ## Channels Service
  channels-service:
    build:
      context: ../services/channels
      dockerfile: Dockerfile
    container_name: colloquia-channels-service
    restart: unless-stopped
    env_file:
      - .dev.env
      - .secrets.env
    ports:
      - "50053:50053"
      - "8083:8083"
    depends_on:
      channels-migrate:
        condition: service_completed_successfully
      users-service:
        condition: service_started

  ## ── Channels Domain ---------------------------------------------------------------

  ## ── Messaging Domain --------------------------------------------------------------
  ## Messaging DB
  messaging-db:
    image: postgres:16-alpine
    container_name: colloquia-messaging-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: colloquia
      POSTGRES_PASSWORD: colloquia_dev_password
      POSTGRES_DB: colloquia-messaging
    ports:
      - "5437:5432"
    volumes:
      - messaging-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colloquia -d colloquia-messaging"]
      interval: 5s
      timeout: 5s
      retries: 5

  ## Messaging DB Migrations
  messaging-migrate:
    image: migrate/migrate:v4.18.1
    container_name: colloquia-messaging-migrate
    volumes:
      - ../services/messaging/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://colloquia:colloquia_dev_password@messaging-db:5432/colloquia-messaging?sslmode=disable"
      - "up"
    depends_on:
      messaging-db:
        condition: service_healthy
    restart: on-failure

  ## Messaging Service
  messaging-service:
    build:
      context: ../services/messaging
      dockerfile: Dockerfile
    container_name: colloquia-messaging-service
    restart: unless-stopped
    env_file:
      - .dev.env
      - .secrets.env
    ports:
      - "50054:50054"
      - "8084:8084"
    depends_on:
      messaging-migrate:
        condition: service_completed_successfully
      channels-service:
        condition: service_started

  ## ── Messaging Domain --------------------------------------------------------------

  ## ── Assist Domain ----------------------------------------------------------------
  ## Ollama — local LLM runtime
  ollama:
    image: ollama/ollama:latest
    container_name: colloquia-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_MAX_LOADED_MODELS: "1"
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  ## Ollama Init — pulls the model once on first run, then warms it up (one-shot)
  ollama-init:
    image: ollama/ollama:latest
    container_name: colloquia-ollama-init
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "ollama pull qwen2.5:0.5b && ollama run qwen2.5:0.5b 'hi'"
    volumes:
      - ollama-data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    restart: on-failure

  ## Assist Service
  assist-service:
    build:
      context: ../services/assist
      dockerfile: Dockerfile
    container_name: colloquia-assist-service
    restart: unless-stopped
    env_file:
      - .dev.env
      - .secrets.env
    environment:
      ASSIST_MESSAGING_GRPC_ADDRESS: messaging-service:50054
      ASSIST_OLLAMA_BASE_URL: http://ollama:11434
      ASSIST_OLLAMA_TIMEOUT_SECONDS: "60"
    ports:
      - "50055:50055"
      - "8085:8085"
    depends_on:
      messaging-service:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully

  ## ── Assist Domain ----------------------------------------------------------------

  ## ── Gateway -----------------------------------------------------------------------
  ## KrakenD API Gateway — single entry point for all frontend clients.
  ## In development the config is volume-mounted so changes take effect on restart
  ## without rebuilding the image. For production, build the Dockerfile in gateway/.
  gateway:
    image: krakend:2
    container_name: colloquia-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - FC_ENABLE=1
      - FC_PARTIALS=/etc/krakend/partials
    volumes:
      - ../gateway:/etc/krakend:ro
    command: ["run", "-c", "/etc/krakend/krakend.tmpl"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/__health"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      auth-service:
        condition: service_started
      users-service:
        condition: service_started
      channels-service:
        condition: service_started
      messaging-service:
        condition: service_started
      assist-service:
        condition: service_started

  ## ── Gateway -----------------------------------------------------------------------

  ## ── Web ───────────────────────────────────────────────────────────────────────
  web:
    image: node:22-alpine
    container_name: colloquia-web
    working_dir: /app
    command: ["sh", "-c", "yarn install && yarn dev --host 0.0.0.0 --port 3000"]
    volumes:
      - ../apps/web:/app
      - web-node-modules:/app/node_modules
    environment:
      PORT: "3000"
    env_file:
      - .dev.env
      - .secrets.env
    depends_on:
      - gateway

  ## ── Web ───────────────────────────────────────────────────────────────────────

  ## ── Ingress ───────────────────────────────────────────────────────────────────
  ingress:
    image: nginx:1.27-alpine
    container_name: colloquia-ingress
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - gateway

  ## ── Ingress ───────────────────────────────────────────────────────────────────

volumes:
  auth-db-data:
  users-db-data:
  channels-db-data:
  messaging-db-data:
  ollama-data:
  web-node-modules:
