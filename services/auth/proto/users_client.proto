syntax = "proto3";

// Minimal definition used by auth service to call users service.
// Must stay in sync with services/users/proto/users.proto (field numbers/types).
package users;

option go_package = "auth/internal/usersclient";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
}

message CreateUserRequest {
  string id    = 1;
  string email = 2;
}

message CreateUserResponse {}
