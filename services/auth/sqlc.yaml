version: "2"

sql:
  - engine: postgresql
    schema: migrations
    queries: internal/db/queries
    gen:
      go:
        package: sqlc
        out: ./internal/db/sqlc
        sql_package: "pgx/v5"
        overrides:
          - db_type: uuid
            go_type: "github.com/google/uuid.UUID"
          
    