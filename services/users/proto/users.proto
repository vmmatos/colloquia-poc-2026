syntax = "proto3";

package users;

option go_package = "users/internal/pb";

service UserService {
  rpc CreateUser(CreateUserRequest)       returns (UserResponse);
  rpc GetUser(GetUserRequest)             returns (UserResponse);
  rpc BatchGetUsers(BatchGetUsersRequest) returns (BatchGetUsersResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UserResponse);
  rpc ListUsers(ListUsersRequest)         returns (ListUsersResponse);
  rpc SearchUsers(SearchUsersRequest)     returns (SearchUsersResponse);
}

message CreateUserRequest {
  string id    = 1;
  string email = 2;
}

message GetUserRequest { string id = 1; }

message BatchGetUsersRequest { repeated string ids = 1; }

message UpdateProfileRequest {
  string          id       = 1;
  optional string name     = 2;
  optional string avatar   = 3;
  optional string bio      = 4;
  optional string timezone = 5;
  optional string status   = 6;
  optional string language = 7;
}

message UserProfile {
  string id         = 1;
  string email      = 2;
  string name       = 3;
  string avatar     = 4;
  string bio        = 5;
  string timezone   = 6;
  string status     = 7;
  int64  created_at = 8;
  int64  updated_at = 9;
  string language   = 10;
}

message UserResponse          { UserProfile user = 1; }
message BatchGetUsersResponse { repeated UserProfile users = 1; }

message ListUsersRequest    { int32 limit = 1; int32 offset = 2; }
message ListUsersResponse   { repeated UserProfile users = 1; }
message SearchUsersRequest  { string query = 1; int32 limit = 2; int32 offset = 3; }
message SearchUsersResponse { repeated UserProfile users = 1; }
